<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishFilter Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Header ─────────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-left">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <span class="brand">PhishFilter <span class="pro">Pro</span></span>
  </div>
  <div class="status" id="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-label">Connecting</span>
  </div>
</header>

<!-- Page card ──────────────────────────────────────── -->
<section class="card">
  <div class="page-domain" id="page-domain">Loading…</div>

  <div class="page-row">
    <div class="page-info">
      <span class="badge" id="verdict-badge">SCANNING</span>
      <p class="summary" id="page-summary">Analyzing this page…</p>
    </div>
    <div class="score">
      <svg viewBox="0 0 60 60">
        <circle class="score-bg" cx="30" cy="30" r="24"/>
        <circle class="score-ring" id="score-ring" cx="30" cy="30" r="24"
                stroke-dasharray="0 151" transform="rotate(-90 30 30)"/>
        <text class="score-num" id="score-num" x="30" y="35">·</text>
      </svg>
    </div>
  </div>

  <div class="scan-pulse" id="scan-pulse">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="pulse-label">Scanning</span>
  </div>

  <div class="flags-preview" id="flags-preview" style="display:none"></div>

  <div class="page-actions">
    <button class="btn primary" id="btn-scan-page">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Scan this page
    </button>
    <button class="btn ghost" id="btn-view-details">View report →</button>
  </div>
</section>

<!-- Stats ───────────────────────────────────────────── -->
<section class="stats">
  <div class="stat">
    <div class="stat-val" id="stat-blocked">0</div>
    <div class="stat-lbl">Blocked</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-links">0</div>
    <div class="stat-lbl">Links scanned</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-passwords">0</div>
    <div class="stat-lbl">Pwds saved</div>
  </div>
  <div class="stat">
    <div class="stat-val danger" id="stat-phishes">0</div>
    <div class="stat-lbl">Phishes</div>
  </div>
</section>

<!-- Engine summary (single line, minimal) ───────────── -->
<section class="engines">
  <span class="eng-lbl">AI engines</span>
  <span class="eng-note" id="engine-note">checking…</span>
  <div class="eng-dots">
    <span class="eng-dot" id="eng-qwen" title="Qwen3-32B"></span>
    <span class="eng-dot" id="eng-kimi" title="Kimi-K2"></span>
    <span class="eng-dot" id="eng-ds"   title="DeepSeek"></span>
    <span class="eng-dot" id="eng-gem"  title="Gemini"></span>
    <span class="eng-dot" id="eng-gpt"  title="GPT-OSS"></span>
  </div>
</section>

<!-- Recent threats ──────────────────────────────────── -->
<section class="activity" id="activity-section" style="display:none">
  <div class="activity-title">Recent threats</div>
  <div id="activity-list"></div>
</section>

<!-- Quick actions ───────────────────────────────────── -->
<section class="actions">
  <button class="btn outline" id="btn-clipboard">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    Scan clipboard
  </button>
  <button class="btn outline" id="btn-dashboard">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    Dashboard
  </button>
</section>

<!-- Settings ────────────────────────────────────────── -->
<section class="settings">
  <button class="settings-toggle" id="settings-toggle">
    <span>Settings</span>
    <svg id="settings-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
  <div class="settings-body" id="settings-body" style="display:none">
    <label class="setting-row">
      <span>Backend URL</span>
      <input class="setting-input" id="setting-backend" type="text" placeholder="https://...">
    </label>
    <label class="setting-row">
      <span>Sensitivity</span>
      <select class="setting-select" id="setting-sensitivity">
        <option value="low">Low (65+ blocks)</option>
        <option value="medium" selected>Medium (50+ warns)</option>
        <option value="high">High (30+ warns)</option>
      </select>
    </label>
    <label class="setting-row">
      <span>Auto-block dangerous</span>
      <input type="checkbox" id="setting-autoblock" checked>
    </label>
    <div class="settings-actions">
      <button class="btn subtle small" id="btn-save-settings">Save</button>
      <button class="btn ghost small" id="btn-whitelist">Whitelist</button>
    </div>
  </div>
</section>

<!-- Whitelist modal ─────────────────────────────────── -->
<div class="modal-overlay" id="whitelist-modal" style="display:none">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">Whitelist</span>
      <button class="close-btn" id="whitelist-close">✕</button>
    </div>
    <p class="modal-help">One domain per line. These sites are never scanned.</p>
    <textarea class="setting-input wide" id="whitelist-textarea" rows="5" placeholder="example.com"></textarea>
    <div class="modal-actions">
      <button class="btn primary small" id="whitelist-save">Save</button>
      <button class="btn ghost small" id="whitelist-cancel">Cancel</button>
    </div>
  </div>
</div>

<footer class="footer">
  <span>v1.0</span>
  <a href="https://phishingo-zk3c.vercel.app/extension" target="_blank">Help</a>
</footer>

<script type="module" src="popup.js"></script>
</body>
</html>
